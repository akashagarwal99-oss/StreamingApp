apiVersion: apps/v1
kind: Deployment

metadata:
  name: chat-service
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: chat-service

  template:
    metadata:
      labels:
        app: chat-service

    spec:
      containers:
        - name: chat-service

          image: "{{ .Values.images.chat.repository }}:{{ .Values.images.chat.tag }}"

          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.service.chat }}

          env:
            - name: PORT
              value: "{{ .Values.service.chat }}"

          envFrom:
            - configMapRef:
                name: streamingapp-config

            - secretRef:
                name: streamingapp-secret

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}

            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.chat }}

            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.chat }}

            initialDelaySeconds: 30
            periodSeconds: 20

---

apiVersion: v1
kind: Service

metadata:
  name: chat-service
  namespace: {{ .Values.namespace }}

spec:
  selector:
    app: chat-service

  ports:
    - protocol: TCP
      port: {{ .Values.service.chat }}
      targetPort: {{ .Values.service.chat }}

  type: ClusterIP

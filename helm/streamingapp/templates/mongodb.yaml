apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: mongodb-pvc
  namespace: {{ .Values.namespace }}

spec:
  accessModes:
    - ReadWriteOnce

  storageClassName: gp2

  resources:
    requests:
      storage: {{ .Values.mongodb.storage.size }}

---

apiVersion: apps/v1
kind: Deployment

metadata:
  name: mongodb
  namespace: {{ .Values.namespace }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongodb

  template:

    metadata:
      labels:
        app: mongodb

    spec:

      containers:

        - name: mongodb

          image: {{ .Values.mongodb.image }}

          ports:
            - containerPort: {{ .Values.mongodb.port }}

          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}

            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          livenessProbe:
            tcpSocket:
              port: {{ .Values.mongodb.port }}

            initialDelaySeconds: {{ .Values.mongodb.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.mongodb.livenessProbe.periodSeconds }}

          readinessProbe:
            tcpSocket:
              port: {{ .Values.mongodb.port }}

            initialDelaySeconds: {{ .Values.mongodb.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.mongodb.readinessProbe.periodSeconds }}

      volumes:

        - name: mongodb-storage

          persistentVolumeClaim:
            claimName: mongodb-pvc

---

apiVersion: v1
kind: Service

metadata:
  name: mongodb
  namespace: {{ .Values.namespace }}

spec:

  selector:
    app: mongodb

  ports:
    - port: {{ .Values.mongodb.port }}
      targetPort: {{ .Values.mongodb.port }}

  type: ClusterIP
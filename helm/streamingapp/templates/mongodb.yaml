apiVersion: apps/v1
kind: Deployment

metadata:
  name: mongodb
  namespace: {{ .Values.namespace }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongodb

  template:
    metadata:
      labels:
        app: mongodb

    spec:
      containers:
        - name: mongodb
          image: {{ .Values.mongodb.image }}

          ports:
            - containerPort: {{ .Values.mongodb.port }}

          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}

            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          livenessProbe:
            tcpSocket:
              port: {{ .Values.mongodb.port }}
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: {{ .Values.mongodb.port }}
            initialDelaySeconds: 10
            periodSeconds: 5

      volumes:
        - name: mongodb-storage
          emptyDir: {}

---

apiVersion: v1
kind: Service

metadata:
  name: mongodb
  namespace: {{ .Values.namespace }}

spec:
  selector:
    app: mongodb

  ports:
    - port: {{ .Values.mongodb.port }}
      targetPort: {{ .Values.mongodb.port }}

  type: ClusterIP

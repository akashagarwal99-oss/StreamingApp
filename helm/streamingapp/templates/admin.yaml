apiVersion: apps/v1
kind: Deployment

metadata:
  name: admin-service
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: admin-service

  template:
    metadata:
      labels:
        app: admin-service

    spec:
      containers:
        - name: admin-service

          image: "{{ .Values.images.admin.repository }}:{{ .Values.images.admin.tag }}"

          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.service.admin }}

          env:
            - name: PORT
              value: "{{ .Values.service.admin }}"

          envFrom:
            - configMapRef:
                name: streamingapp-config

            - secretRef:
                name: streamingapp-secret

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}

            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.admin }}

            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.service.admin }}

            initialDelaySeconds: 30
            periodSeconds: 20

---

apiVersion: v1
kind: Service

metadata:
  name: admin-service
  namespace: {{ .Values.namespace }}

spec:
  selector:
    app: admin-service

  ports:
    - protocol: TCP
      port: {{ .Values.service.admin }}
      targetPort: {{ .Values.service.admin }}

  type: ClusterIP
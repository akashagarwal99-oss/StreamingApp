apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-service
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
        - name: auth-service
          image: "{{ .Values.images.auth.repository }}:{{ .Values.images.auth.tag }}"
          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.service.auth }}

          env:
            - name: PORT
              value: "{{ .Values.service.auth }}"

          envFrom:
            - configMapRef:
                name: streamingapp-config

            - secretRef:
                name: streamingapp-secret

          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}

            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.auth }}
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.auth }}
            initialDelaySeconds: 30
            periodSeconds: 20

---

apiVersion: v1
kind: Service

metadata:
  name: auth-service
  namespace: {{ .Values.namespace }}

spec:
  selector:
    app: auth-service

  ports:
    - protocol: TCP
      port: {{ .Values.service.auth }}
      targetPort: {{ .Values.service.auth }}

  type: ClusterIP